[build]
  command   = "node SCRIPTS/build-product-catalogue.mjs && npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from   = "/12-ft/"
  to     = "/our-caravans/"
  status = 301

[[redirects]]
  from   = "/15-ft/"
  to     = "/our-caravans/"
  status = 301

[[redirects]]
  from   = "/15-ft-pop-top/"
  to     = "/our-caravans/"
  status = 301

[[redirects]]
  from   = "/17-ft/"
  to     = "/our-caravans/"
  status = 301

[[redirects]]
  from   = "/"
  to     = "/our-slide-on-campers/?q=:search"
  status = 301
  query  = {s = ":search"}

[[redirects]]
  from   = "/feed/"
  to     = "/"
  status = 301

[[redirects]]
  from   = "/advent-"
  to     = "/our-slide-on-campers/"
  status = 301

[[redirects]]
  from   = "/advent-2150"
  to     = "/advent-2150-hardtop-slide-on/"
  status = 301

[[redirects]]
  from   = "/3-5m-truck-camper-cabover/"
  to     = "/expedition/3-5m-electric-poptop-cabover-family-camper/"
  status = 301

[[redirects]]
  from   = "/3-5m-truck-camper"
  to     = "/3-5m-poptop-truck-camper/"
  status = 301

[[redirects]]
  from   = "/3-5m-truck-camper/"
  to     = "/3-5m-poptop-truck-camper/"
  status = 301

[[redirects]]
  from   = "/15ft-truck-camper-combined-shower-toilet/"
  to     = "/3-5m-poptop-truck-camper/"
  status = 301

[[redirects]]
  from   = "/expedition/isuzu-nps-cabover-camper/"
  to     = "/expedition/3-5m-electric-poptop-cabover-family-camper/"
  status = 301

[[redirects]]
  from   = "/expedition/isuzu-nps-poptop-camper/"
  to     = "/expedition/4-7m-hardtop-truck-camper/"
  status = 301

[[redirects]]
  from   = "/4-7m-truck-camper/"
  to     = "/expedition/4-7m-hardtop-truck-camper/"
  status = 301

[[redirects]]
  from   = "/8ft-hardtop-slide-on/"
  to     = "/7ft-electric-poptop-slide-on/"
  status = 301

[[redirects]]
  from   = "/4-6m-poptop-truck-camper-one-off/"
  to     = "/3-5m-poptop-truck-camper/"
  status = 301

[[redirects]]
  from   = "/media/*"
  to     = "/.netlify/functions/media-serve/:splat"
  status = 200

[[redirects]]
  from   = "/api/checkout"
  to     = "/.netlify/functions/checkout"
  status = 200

[[redirects]]
  from   = "/api/session-status"
  to     = "/.netlify/functions/session-status"
  status = 200

[[redirects]]
  from   = "/api/stripe-webhook"
  to     = "/.netlify/functions/stripe-webhook"
  status = 200

[[redirects]]
  from   = "/api/shipping-quote"
  to     = "/.netlify/functions/shipping-quote"
  status = 200

[[headers]]
  for    = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "accelerometer=(), autoplay=(), camera=(), display-capture=(), encrypted-media=(), fullscreen=(self \"https://www.youtube-nocookie.com\"), geolocation=(), gyroscope=(), microphone=(), payment=(), usb=()"
    Cross-Origin-Opener-Policy = "same-origin"
    X-Permitted-Cross-Domain-Policies = "none"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' https://us.i.posthog.com https://*.posthog.com; script-src-attr 'unsafe-inline'; connect-src 'self' https://api.stripe.com https://us.i.posthog.com https://*.posthog.com https://api.resend.com https://api.openai.com https://api.github.com https://www.googleapis.com https://oauth2.googleapis.com; frame-src 'self' https://www.youtube-nocookie.com https://js.stripe.com; upgrade-insecure-requests"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/wp-content/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/favicon*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
