[build]
  command   = "node SCRIPTS/build-product-catalogue.mjs && npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from   = "/12-ft/"
  to     = "/our-caravans/"
  status = 301

[[redirects]]
  from   = "/15-ft/"
  to     = "/our-caravans/"
  status = 301

[[redirects]]
  from   = "/3-5m-truck-camper-cabover/"
  to     = "/our-slide-on-campers/"
  status = 301

[[redirects]]
  from   = "/media/*"
  to     = "/.netlify/functions/media-serve?key=:splat"
  status = 200

[[headers]]
  for    = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/wp-content/uploads/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/favicon*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
